<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Notes</title>
</head>
<body>

<h1>My Notes</h1>

<button><a href="/notes/add">Add Note</a></button>

<div th:each="note : ${notes}">
    <h3 th:text="${note.noteTitle}"></h3>
    <p th:text="${note.noteBody}"></p>

    <form th:action="@{/notes/delete/{id}(id=${note.noteId})}" method="post">
        <button type="submit">Delete</button>
    </form>
</div>

</body>
</html>
